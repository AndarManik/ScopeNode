<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0a0a0a" />

    <title>Scope Node</title>
    <meta name="description" content="Top-down Aim-bot Shooter" />

    <link rel="icon" href="./assets/icons/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="./assets/icons/icon.svg" />
    <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png" />

    <link rel="manifest" href="./manifest.json" />

    <meta property="og:title" content="Scope Node" />
    <meta property="og:description" content="Top-down Aim-bot Shooter" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./assets/og/og.png" />

    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src https://fonts.gstatic.com;
        connect-src 'self' ws: wss:;
        img-src 'self' data:;
      "
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap"
      rel="stylesheet"
    />
    <link rel="modulepreload" href="./app.js" />
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <div id="App" role="application" aria-label="Scope Node">
      <canvas id="Game" width="1024" height="768"></canvas>
      <div id="Huge"></div>
      <div id="Menu"></div>
      <p id="Stats"></p>
      <div id="Console"></div>
    </div>

    <noscript>
      <style>
        body {
          background: black;
          color: white;
          font-family: system-ui, sans-serif;
          padding: 24px;
        }
      </style>
      <p>This application requires JavaScript.</p>
    </noscript>
  </body>
  <script src="./app.js" type="module"></script>
</html>
